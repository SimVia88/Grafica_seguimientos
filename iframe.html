<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica en iFrame</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #E1E8ED;
      overflow: hidden;
    }

    .iframe-container {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div class="iframe-container">
    <iframe id="grafica-frame"></iframe>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const referencia = params.get("referencia") || "0";
    const seguimiento1 = params.get("seguimiento1") || "0";
    const seguimiento2 = params.get("seguimiento2") || "0";
    const seguimientoAnual = params.get("seguimientoAnual") || "0";
    const criterio = params.get("criterio") || "AUM";

    const iframeSrc =
      `index.html?referencia=${encodeURIComponent(referencia)}` +
      `&seguimiento1=${encodeURIComponent(seguimiento1)}` +
      `&seguimiento2=${encodeURIComponent(seguimiento2)}` +
      `&seguimientoAnual=${encodeURIComponent(seguimientoAnual)}` +
      `&criterio=${encodeURIComponent(criterio)}` +
      `&v=${Date.now()}`;

    document.getElementById("grafica-frame").src = iframeSrc;
  </script>
</body>
</html>
