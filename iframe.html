<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica en iFrame</title>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #E1E8ED;
      margin: 0;
      overflow: hidden;
    }

    .iframe-container {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    iframe {
      width: 90vw;
      height: 80vh;
      border: none;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div class="iframe-container">
    <iframe id="grafica-frame"></iframe>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);

    const referencia = params.get("referencia") || "0";
    const seguimiento1 = params.get("seguimiento1") || "0";
    const seguimiento2 = params.get("seguimiento2") || "0";
    const seguimientoAnual = params.get("seguimientoAnual") || "0";
    const criterio = params.get("criterio") || "AUM";

    const iframeSrc =
      `index.html?referencia=${encodeURIComponent(referencia)}` +
      `&seguimiento1=${encodeURIComponent(seguimiento1)}` +
      `&seguimiento2=${encodeURIComponent(seguimiento2)}` +
      `&seguimientoAnual=${encodeURIComponent(seguimientoAnual)}` +
      `&criterio=${encodeURIComponent(criterio)}`;

    document.getElementById("grafica-frame").src = iframeSrc;

    function resizeIframe() {
      const iframe = document.getElementById("grafica-frame");
      iframe.style.height = window.innerHeight + "px";
    }

    window.addEventListener("resize", resizeIframe);
    resizeIframe();
  </script>
</body>
</html>
