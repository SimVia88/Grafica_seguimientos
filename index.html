<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica de Seguimiento</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .chart-card {
      width: 92vw;
      height: 82vh;
      background: #E1E8ED;
      border-radius: 14px;
      padding: 24px;
      box-sizing: border-box;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.18);
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
    }
  </style>
</head>

<body>
  <div class="chart-card">
    <canvas id="myChart"></canvas>
  </div>

  <script>
    function convertir(valor) {
      const num = parseFloat((valor || "0").toString().replace(",", "."));
      return isNaN(num) ? 0 : num / 100;
    }

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);

      return {
        referencia: convertir(params.get("referencia")),
        criterio: params.get("criterio") || "AUM",
        datos: [
          convertir(params.get("seguimiento1")),
          convertir(params.get("seguimiento2"))
        ]
      };
    }

    const params = getQueryParams();

    const etiquetas = [
      "Seguimiento 1er semestre",
      "Seguimiento 2º semestre"
    ];

    const referenciaArray = etiquetas.map(() => params.referencia);

    const ctx = document.getElementById("myChart").getContext("2d");

    function createGradient(ctx, arriba, abajo) {
      const gradient = ctx.createLinearGradient(0, 0, 0, 500);
      gradient.addColorStop(0, arriba);
      gradient.addColorStop(1, abajo);
      return gradient;
    }

    const barColors = params.datos.map(valor => {
      if (params.criterio === "AUM") {
        return valor >= params.referencia
          ? createGradient(ctx, "#00c853", "#66ffa6")
          : createGradient(ctx, "#d50000", "#ff8a80");
      } else {
        return valor >= params.referencia
          ? createGradient(ctx, "#d50000", "#ff8a80")
          : createGradient(ctx, "#00c853", "#66ffa6");
      }
    });

    const maxValor = Math.max(...params.datos, params.referencia);
    const minValor = Math.min(...params.datos, params.referencia);

    new Chart(ctx, {
      type: "bar",
      data: {
        labels: etiquetas,
        datasets: [
          {
            label: "Valores de seguimiento",
            data: params.datos,
            backgroundColor: barColors,
            borderColor: "#ffffff",
            borderWidth: 1,
            borderRadius: 10,
            barThickness: 120
          },
          {
            label: "Valor de referencia",
            data: referenciaArray,
            type: "line",
            borderColor: "#1e40ff",
            backgroundColor: "#1e40ff",
            borderWidth: 3,
            pointRadius: 5,
            pointHoverRadius: 7,
            tension: 0.2,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,

        plugins: {
          legend: {
            position: "top",
            labels: {
              font: {
                size: 14,
                weight: "bold"
              },
              color: "#333"
            }
          },

          tooltip: {
            callbacks: {
              label: function(context) {
                return `${context.dataset.label}: ${context.raw.toFixed(2)}`;
              }
            }
          }
        },

        scales: {
          x: {
            ticks: {
              color: "#333",
              font: {
                size: 13,
                weight: "bold"
              }
            },
            grid: {
              display: false
            }
          },

          y: {
            beginAtZero: true,
            suggestedMax: maxValor * 1.25,
            ticks: {
              color: "#333",
              font: {
                size: 12
              },
              callback: function(value) {
                return value.toFixed(2);
              }
            },
            grid: {
              color: "rgba(0, 0, 0, 0.12)"
            }
          }
        }
      }
    });
  </script>
</body>
</html>
