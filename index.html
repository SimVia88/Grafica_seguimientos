<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica de Seguimiento</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #E1E8ED;
      font-family: Arial, sans-serif;
    }

    .chart-card {
      width: 100vw;
      height: 100vh;
      padding: 8px;
      box-sizing: border-box;
      background: #E1E8ED;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>

<body>
  <div class="chart-card">
    <canvas id="myChart"></canvas>
  </div>

  <script>
    function convertir(valor) {
      const num = parseFloat((valor || "0").toString().replace(",", "."));
      return isNaN(num) ? 0 : num / 100;
    }

    const urlParams = new URLSearchParams(window.location.search);

    const referencia = convertir(urlParams.get("referencia"));
    const seguimiento1 = convertir(urlParams.get("seguimiento1"));
    const seguimiento2 = convertir(urlParams.get("seguimiento2"));
    const criterio = urlParams.get("criterio") || "AUM";

    const etiquetas = [
      "Seguimiento 1er semestre",
      "Seguimiento 2º semestre"
    ];

    const datos = [seguimiento1, seguimiento2];
    const referenciaArray = [referencia, referencia];

    const ctx = document.getElementById("myChart").getContext("2d");

    const coloresBarras = datos.map(valor => {
      if (criterio === "AUM") {
        return valor >= referencia ? "#5FD475" : "#F19595";
      } else {
        return valor <= referencia ? "#5FD475" : "#F19595";
      }
    });
	
	
	const url = new URLSearchParams(window.location.search);

	document.body.innerHTML = `
	  <div style="font-size:30px; padding:30px; background:white;">
		referencia recibida: ${url.get("referencia")}<br>
		seguimiento1 recibido: ${url.get("seguimiento1")}<br>
		seguimiento2 recibido: ${url.get("seguimiento2")}<br>
		criterio recibido: ${url.get("criterio")}
	  </div>
	`;
	
    const maxValor = Math.max(...datos, referencia, 1);

    new Chart(ctx, {
      type: "bar",
      data: {
        labels: etiquetas,
        datasets: [
          {
            label: "Valores de seguimiento",
            data: datos,
            backgroundColor: coloresBarras,
            borderRadius: 8,
            barPercentage: 0.45,
            categoryPercentage: 0.65
          },
          {
            label: "Valor de referencia",
            data: referenciaArray,
            type: "line",
            borderColor: "#1e40ff",
            backgroundColor: "#1e40ff",
            borderWidth: 3,
            pointRadius: 5,
            tension: 0,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: 6
        },
        plugins: {
          legend: {
            position: "top",
            labels: {
              color: "#333",
              font: {
                size: 13,
                weight: "bold"
              }
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return `${context.dataset.label}: ${context.raw.toFixed(2)}`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#333",
              font: {
                size: 11,
                weight: "bold"
              }
            },
            grid: {
              display: false
            }
          },
          y: {
            beginAtZero: true,
            suggestedMax: maxValor * 1.2,
            ticks: {
              color: "#333",
              font: {
                size: 11
              },
              callback: function(value) {
                return Number(value).toFixed(2);
              }
            },
            grid: {
              color: "rgba(0,0,0,0.12)"
            }
          }
        }
      }
    });
  </script>
</body>
</html>
