<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gráfica de Seguimiento</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .chart-card {
      width: 100vw;
      height: 100vh;
      margin: 0;
      padding: 10px;
      box-sizing: border-box;
      background: #E1E8ED;
      border-radius: 0;
    }

    canvas {
      width: 100% !important;
      height: 100% !important;
      display: block;
    }
  </style>
</head>

<body>
  <div class="chart-card">
    <canvas id="myChart"></canvas>
  </div>

  <script>
    function convertir(valor) {
      const num = parseFloat((valor || "0").toString().replace(",", "."));
      return isNaN(num) ? 0 : num / 100;
    }

    function getQueryParams() {
      const params = new URLSearchParams(window.location.search);

      return {
        referencia: convertir(params.get("referencia")),
        criterio: params.get("criterio") || "AUM",
        datos: [
          convertir(params.get("seguimiento1")),
          convertir(params.get("seguimiento2"))
        ]
      };
    }

    const params = getQueryParams();

    const etiquetas = [
      "Seguimiento 1er semestre",
      "Seguimiento 2º semestre"
    ];

    const referenciaArray = etiquetas.map(() => params.referencia);

    const ctx = document.getElementById("myChart").getContext("2d");

    const barColors = params.datos.map(valor => {
      if (params.criterio === "AUM") {
        return valor >= params.referencia ? "#5FD475" : "#F19595";
      } else {
        return valor >= params.referencia ? "#F19595" : "#5FD475";
      }
    });

    const maxValor = Math.max(...params.datos, params.referencia, 1);

    new Chart(ctx, {
      type: "bar",
      data: {
        labels: etiquetas,
        datasets: [
          {
            label: "Valores de seguimiento",
            data: params.datos,
            backgroundColor: barColors,
            borderRadius: 8,
            barPercentage: 0.45,
            categoryPercentage: 0.65
          },
          {
            label: "Valor de referencia",
            data: referenciaArray,
            type: "line",
            borderColor: "#1e40ff",
            backgroundColor: "#1e40ff",
            borderWidth: 3,
            pointRadius: 4,
            tension: 0,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        layout: {
          padding: {
            top: 10,
            right: 10,
            bottom: 5,
            left: 5
          }
        },
        plugins: {
          legend: {
            position: "top",
            labels: {
              color: "#333",
              font: {
                size: 13,
                weight: "bold"
              }
            }
          },
          tooltip: {
            callbacks: {
              label: function(context) {
                return `${context.dataset.label}: ${context.raw.toFixed(2)}`;
              }
            }
          }
        },
        scales: {
          x: {
            ticks: {
              color: "#333",
              font: {
                size: 11,
                weight: "bold"
              }
            },
            grid: {
              display: false
            }
          },
          y: {
            beginAtZero: true,
            suggestedMax: maxValor * 1.2,
            ticks: {
              color: "#333",
              font: {
                size: 11
              },
              callback: function(value) {
                return Number(value).toFixed(2);
              }
            },
            grid: {
              color: "rgba(0,0,0,0.12)"
            }
          }
        }
      }
    });
  </script>
</body>
</html>
